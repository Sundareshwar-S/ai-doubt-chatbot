<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Doubt Solver</title>
    <script>
      // Set the theme before first paint to avoid a light->dark flash.
      // Honor a stored choice, else fall back to the OS preference.
      (function () {
        try {
          var saved = localStorage.getItem('ai-doubt-solver-theme');
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          /* localStorage/matchMedia unavailable — CSS media-query fallback covers it */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
